<div
  #canvasRoot
  class="canvas-root"
  (mousedown)="onCanvasMouseDown($event)"
  (wheel)="onWheel($event)"
  (dragover)="onDragOver($event)"
  (drop)="onDrop($event)">

  <svg class="edges-layer" [attr.width]="'100%'" [attr.height]="'100%'">
    <defs>
      <marker
        id="wf-arrow"
        viewBox="0 0 10 10"
        refX="9" refY="5"
        markerUnits="userSpaceOnUse"
        markerWidth="10" markerHeight="10"
        orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"></path>
      </marker>
    </defs>

    <g [attr.transform]="'translate(' + viewport.x + ' ' + viewport.y + ') scale(' + viewport.zoom + ')'">
      <ng-container *ngFor="let edge of edges; trackBy: trackEdge">
        <g
          app-workflow-edge
          [edgeId]="edge.id"
          [x1]="edgeStart(edge).x"
          [y1]="edgeStart(edge).y"
          [x2]="edgeEnd(edge).x"
          [y2]="edgeEnd(edge).y"
          (edgeClick)="onEdgeClick(edge)"></g>
      </ng-container>

      <g
        *ngIf="draftLink"
        app-workflow-edge
        [edgeId]="'__draft'"
        [x1]="draftLink.startX"
        [y1]="draftLink.startY"
        [x2]="draftLink.currentX"
        [y2]="draftLink.currentY"
        [draft]="true"></g>
    </g>
  </svg>

  <div class="nodes-layer" [style.transform]="worldTransform()">
    <app-workflow-node
      *ngFor="let node of nodes; trackBy: trackNode"
      [node]="node"
      [selected]="selectedNodeId === node.id"
      [validation]="validationFor(node)"
      [outgoingDefault]="outgoingDefault(node.id)"
      [outgoingOptionIndices]="outgoingOptions(node.id)"
      (nodeMouseDown)="onNodeMouseDown($event, node)"
      (nodeClick)="onNodeClick(node)"
      (portMouseDown)="onPortMouseDown($event)"
      (portMouseUp)="onPortMouseUp($event)"></app-workflow-node>
  </div>
</div>
